on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

name: Go
permissions:
  contents: read
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Go
      id: go
      uses: actions/setup-go@v4
      with:
        go-version-file: 'go.mod'
        check-latest: true
    - name: Test
      run: go test ./...
  download-common-projects:
    name: download common projects
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: 'go.mod'
        check-latest: true
    - name: Build bin
      run: go build -o ./bin .
    - name: Download 5 projects and verify pinned version is not upgraded
      env:
        GITHUB_AUTH_TOKEN: ${{ github.token }}
        PINNED_GH_VERSION: v2.40.1
      run: |
        set -euo pipefail
        BIN_CONFIG="${RUNNER_TEMP}/config.json"
        export BIN_CONFIG
        mkdir -p "${RUNNER_TEMP}/managed-bin"
        cat > "${BIN_CONFIG}" <<EOF
        {"default_path":"${RUNNER_TEMP}/managed-bin","bins":{}}
        EOF

        ./bin install github.com/kubernetes-sigs/kind kind
        ./bin install github.com/jqlang/jq jq
        ./bin install github.com/mikefarah/yq yq
        ./bin install --provider hashicorp https://releases.hashicorp.com/terraform terraform
        ./bin install "goinstall://github.com/cli/cli/v2/cmd/gh@${PINNED_GH_VERSION}" gh-old
        ./bin pin gh-old

        python - <<'PY'
        import json, os
        cfg_path = os.environ["BIN_CONFIG"]
        with open(cfg_path, encoding="utf-8") as f:
            cfg = json.load(f)
        if len(cfg["bins"]) != 5:
            raise SystemExit(f"expected 5 installed projects, got {len(cfg['bins'])}")
        gh_old = None
        for item in cfg["bins"].values():
            if item["path"].endswith("/gh-old"):
                gh_old = item
                break
        if not gh_old:
            raise SystemExit("gh-old binary not found in config")
        if not gh_old.get("pinned"):
            raise SystemExit("gh-old was not pinned")
        PY

        gh_old_version() {
          python - <<'PY'
        import json, os
        with open(os.environ["BIN_CONFIG"], encoding="utf-8") as f:
            cfg = json.load(f)
        gh_old_version = None
        for item in cfg["bins"].values():
            if item["path"].endswith("/gh-old"):
                gh_old_version = item["version"]
                break
        if not gh_old_version:
            raise SystemExit("gh-old version missing")
        print(gh_old_version)
        PY
        }

        pinned_version_before="$(gh_old_version)"
        test -n "${pinned_version_before}" || { echo "Error: failed to read pinned version before update"; exit 1; }

        ./bin update -y

        pinned_version_after="$(gh_old_version)"
        test -n "${pinned_version_after}" || { echo "Error: failed to read pinned version after update"; exit 1; }

        test "${pinned_version_before}" = "${pinned_version_after}" || { echo "Error: pinned version changed from ${pinned_version_before} to ${pinned_version_after}"; exit 1; }
